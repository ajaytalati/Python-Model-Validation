name: Option D validation

# Re-runs the SWAT gating tests, the Fisher-information identifiability
# analysis, and the Lyapunov stability sweep whenever Option D model code
# changes. Catches structural regressions before they reach OT-Control.

on:
  push:
    branches: [main]
    paths:
      - "src/model_validation/**"
      - "tests/**"
      - "identifiability/**"
      - "Stability_Analysis/**"
      - "pyproject.toml"
      - ".github/workflows/option_d_validation.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/model_validation/**"
      - "tests/**"
      - "identifiability/**"
      - "Stability_Analysis/**"
      - "pyproject.toml"
      - ".github/workflows/option_d_validation.yml"
  workflow_dispatch:           # allow manual trigger

jobs:

  # ====================================================================
  # JOB 1 — Fast gating tests
  # ====================================================================
  # Runs the 17-test SWAT gating suite. ~5 min on CPU. Always required.
  # ====================================================================
  gating-tests:
    name: SWAT gating tests (Option D)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
        env:
          JAX_PLATFORMS: cpu

      - name: Run SWAT gating tests under Option D
        run: |
          python -m pytest tests/swat/ --variant option-c -v --tb=short
        env:
          JAX_PLATFORMS: cpu

  # ====================================================================
  # JOB 2 — Identifiability + Lyapunov stability
  # ====================================================================
  # Runs the FIM analysis (~10-15 min on CPU) and the 8-corner stability
  # sweep (~5-10 min on CPU). Both are the same analyses that produce the
  # documented results in identifiability/ and Stability_Analysis/.
  # Both must report PASS or the build fails.
  # ====================================================================
  identifiability-and-stability:
    name: Identifiability + Lyapunov stability
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: gating-tests           # don't burn cycles if gating already failed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
        env:
          JAX_PLATFORMS: cpu

      - name: Fisher-information identifiability
        # Exits non-zero if rank < N or condition number > 1e10.
        run: |
          python -u identifiability/compute_fim.py
        env:
          JAX_PLATFORMS: cpu

      - name: Upload FIM artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fim-results
          path: identifiability/results/
          retention-days: 30

      - name: Lyapunov stability — 8-corner sweep
        # Exits non-zero if any corner fails its acceptance threshold.
        run: |
          python -u Stability_Analysis/corner_case_sweep.py
        env:
          JAX_PLATFORMS: cpu

      - name: Upload Lyapunov artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lyapunov-results
          path: Stability_Analysis/results/
          retention-days: 30

  # ====================================================================
  # JOB 3 — Tag if everything passes (main branch only)
  # ====================================================================
  # If both jobs pass on main, tag the commit so OT-Control's vendor-sync
  # script can identify it as a known-good Option D snapshot.
  # ====================================================================
  tag-validated:
    name: Tag commit as validated
    runs-on: ubuntu-latest
    needs: [gating-tests, identifiability-and-stability]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag commit
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="option-d-validated-${DATE}-${SHA_SHORT}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"
