name: FSA-high-res validation

# Re-runs the FSA-high-res Fisher-information identifiability analysis
# and the Lyapunov stability sweep whenever FSA model code changes.
# Catches structural regressions before they reach OT-Control.
#
# NOTE: gating tests for FSA (tests/fsa_high_res/) are not yet written
# — they're a follow-up to this PR. Once they land, add a third job
# mirroring SWAT's gating-tests job. Until then this workflow gates on
# identifiability + stability only.

on:
  push:
    branches: [main]
    paths:
      - "src/model_validation/**"
      - "tests/fsa_high_res/**"
      - "identifiability/fsa_high_res/**"
      - "stability/fsa_high_res/**"
      - "pyproject.toml"
      - ".github/workflows/fsa_high_res_validation.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/model_validation/**"
      - "tests/fsa_high_res/**"
      - "identifiability/fsa_high_res/**"
      - "stability/fsa_high_res/**"
      - "pyproject.toml"
      - ".github/workflows/fsa_high_res_validation.yml"
  workflow_dispatch:           # allow manual trigger

jobs:

  # ====================================================================
  # JOB 1 — Identifiability + Lyapunov stability
  # ====================================================================
  # Runs the FIM analysis (~5 min on CPU) and the 5-corner stability
  # sweep (~5 sec on CPU after JIT). Both are the same analyses that
  # produce the documented results in identifiability/fsa_high_res/
  # and stability/fsa_high_res/. Both must report PASS or the build
  # fails.
  # ====================================================================
  identifiability-and-stability:
    name: Identifiability + Lyapunov stability
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
        env:
          JAX_PLATFORMS: cpu

      - name: Fisher-information identifiability
        # Exits non-zero if rank < N or condition number > 1e10.
        run: |
          python -u identifiability/fsa_high_res/compute_fim.py
        env:
          JAX_PLATFORMS: cpu

      - name: Upload FIM artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fsa-fim-results
          path: identifiability/fsa_high_res/results/
          retention-days: 30

      - name: Lyapunov stability — 5-corner sweep
        # Exits non-zero if any corner fails its acceptance threshold.
        run: |
          python -u stability/fsa_high_res/corner_case_sweep.py
        env:
          JAX_PLATFORMS: cpu

      - name: Upload Lyapunov artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fsa-lyapunov-results
          path: stability/fsa_high_res/results/
          retention-days: 30

  # ====================================================================
  # JOB 2 — Tag if everything passes (main branch only)
  # ====================================================================
  # If the validation jobs pass on main, tag the commit so OT-Control's
  # vendor-sync script can identify it as a known-good FSA snapshot.
  # ====================================================================
  tag-validated:
    name: Tag commit as validated
    runs-on: ubuntu-latest
    needs: [identifiability-and-stability]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag commit
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="fsa_high_res-validated-${DATE}-${SHA_SHORT}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"
